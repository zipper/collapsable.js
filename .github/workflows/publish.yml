name: Publish
on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v5

      - name: Setup Node 📦
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies 👨🏻‍💻
        run: npm ci

      - name: Build 🔨
        run: npm run build

      - name: Upload artifacts 🧩
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v5

      - name: Download artifacts 🧩
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Create release draft 🕊️
        run: |
          gh release create "${{ github.ref_name }}" --draft --target "${{ github.sha }}" \
            dist/Collapsable.js \
            dist/Collapsable.js.map \
            dist/Collapsable.min.js \
            dist/Collapsable.min.js.map
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publishPublic:
    name: Publish (public)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v5

      - name: Download artifacts 🧩
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Setup Node 📦
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      - name: Publish release 🕊️
        # `npm publish --provenance` intermittently fails with a Sigstore transparency log
        # 409 (`TLOG_CREATE_ENTRY_ERROR`). The tlog entry is created before the registry
        # upload, so on that error nothing is published and a fresh attempt (new attestation)
        # succeeds. Retry a few times; if a previous attempt already published the version,
        # treat the publish conflict as success.
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "::group::npm publish attempt $attempt"
            output=$(npm publish --provenance --access public 2>&1)
            status=$?
            echo "$output"
            echo "::endgroup::"
            if [ $status -eq 0 ]; then
              exit 0
            fi
            if echo "$output" | grep -q "EPUBLISHCONFLICT\|cannot publish over"; then
              echo "Version already published — treating as success."
              exit 0
            fi
            echo "Attempt $attempt failed (exit $status). Retrying in 15s…"
            sleep 15
          done
          echo "npm publish failed after 3 attempts."
          exit 1
